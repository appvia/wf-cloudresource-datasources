apiVersion: cloudresources.appvia.io/v2beta2
kind: CloudResourceDataSource
metadata:
  name: google-compute-subnetwork
spec:
  description: GCP Subnetwork resource kind
  version: "1.0.0"
  provider: terraform
  cloud: gcp
  terraform:
    search:
      template: |
        data "google_client_config" "current" {}

        # List Subnetworks using Cloud Asset Inventory
        data "google_cloud_asset_search_all_resources" "subnetworks" {
          scope = "projects/${data.google_client_config.current.project}"
          asset_types = [
            "compute.googleapis.com/Subnetwork"
          ]
        }

        locals {
          desired_labels = var.resource_tags != null ? var.resource_tags : {}
          all_subnetworks = [for asset in data.google_cloud_asset_search_all_resources.subnetworks.results : {
            # Example asset.name:
            # //compute.googleapis.com/projects/PROJECT/regions/REGION/subnetworks/SUBNETWORK
            # Extract the last segment as the subnetwork name and the element after "regions" as the region
            name   = element(split("/", asset.name), length(split("/", asset.name)) - 1)
            region = element(split("/", asset.name), index(split("/", asset.name), "regions") + 1)
            labels = try(asset.labels, {})
          }]

          filtered_subnetworks = length(local.desired_labels) == 0 ? local.all_subnetworks : [
            for s in local.all_subnetworks : s
            if alltrue([
              for k, v in local.desired_labels :
              contains(keys(s.labels), k) && s.labels[k] == v
            ])
          ]
        }

        output "output" {
          value = [for s in local.filtered_subnetworks : {
            name   = s.name
            region = s.region
          }]
        }
    resource:
      template: |
        data "google_client_config" "current" {}

        # Expect identifiers: name, region
        data "google_compute_subnetwork" "result" {
          name    = var.name
          region  = var.region
          project = data.google_client_config.current.project
        }

        output "name" {
          value = data.google_compute_subnetwork.result.name
        }

        output "network" {
          value = data.google_compute_subnetwork.result.network
        }

        output "ip_cidr_range" {
          value = data.google_compute_subnetwork.result.ip_cidr_range
        }


      outputs:
      - name: name
        type: string
      - name: region
        type: string
      - name: network
        type: string
      - name: ip_cidr_range
        type: string
