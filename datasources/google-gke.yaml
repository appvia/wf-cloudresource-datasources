apiVersion: cloudresources/v3
kind: CloudResourceDataSource
metadata:
  name: google-gke
  systemScope: true
spec:
  description: Google GKE cluster resource kind
  version: "1.0.0"
  provider: terraform
  cloud: gcp
  terraform:
    search:
      template: |
        # List GKE clusters using Cloud Asset Inventory
        data "google_client_config" "current" {}

        data "google_cloud_asset_search_all_resources" "gke_clusters" {
          scope = "projects/${data.google_client_config.current.project}"
          asset_types = [
            "container.googleapis.com/Cluster"
          ]
        }

        # Parse cluster information from asset inventory results
        locals {
          desired_labels = var.resource_tags != null ? var.resource_tags : {}
          all_clusters = [for asset in data.google_cloud_asset_search_all_resources.gke_clusters.results : {
            # Example asset.name:
            # //container.googleapis.com/projects/PROJECT/locations/LOCATION/clusters/CLUSTER
            # Extract the last segment as the cluster name and the element after "locations" as the location
            name     = element(split("/", asset.name), length(split("/", asset.name)) - 1)
            location = element(split("/", asset.name), index(split("/", asset.name), "locations") + 1)
            labels   = try(asset.labels, {})
            asset    = asset
          }]
          
          # Filter clusters by labels if provided
          filtered_clusters = length(local.desired_labels) == 0 ? local.all_clusters : [
            for cluster in local.all_clusters : cluster
            if alltrue([
              for k, v in local.desired_labels :
              contains(keys(cluster.labels), k) && cluster.labels[k] == v
            ])
          ]
        }

        output "output" {
          value = [for cluster in local.filtered_clusters : {
            name     = cluster.name
            location = cluster.location
          }]
        }
    resource:
      template: |
        data "google_client_config" "current" {}

        # Expect identifiers: name and location
        data "google_container_cluster" "result" {
          name     = var.name
          location = var.location
          project  = data.google_client_config.current.project
        }

        output "endpoint" {
          value = data.google_container_cluster.result.endpoint
        }

        output "name" {
          value = data.google_container_cluster.result.name
        }

        output "location" {
          value = var.location
        }

        output "release_channel" {
          value = try(data.google_container_cluster.result.release_channel.0.channel, null)
        }

        output "resource_labels" {
          value = data.google_container_cluster.result.resource_labels
        }

      outputs:
      - name: name
        type: string
      - name: location
        type: string
      - name: endpoint
        type: string


