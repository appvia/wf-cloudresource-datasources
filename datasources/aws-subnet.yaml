apiVersion: cloudresources.appvia.io/v2beta2
kind: CloudResourceDataSource
metadata:
  name: aws-subnet
spec:
  description: AWS Subnet resource kind
  version: "1.0.0"
  provider: terraform
  cloud: aws
  terraform:
    search:
      template: |
        # List Subnets; if resource_tags provided, apply server-side tag filters
        data "aws_subnets" "all" {
          dynamic "filter" {
            for_each = var.resource_tags != null ? var.resource_tags : {}
            content {
              name   = "tag:${filter.key}"
              values = [filter.value]
            }
          }
        }

        # Fetch details for each subnet ID returned
        data "aws_subnet" "details" {
          for_each = toset(data.aws_subnets.all.ids)
          id       = each.value
        }

        # Output the results with a consistent structure
        output "output" {
          value = [for id, subnet in data.aws_subnet.details : {
            subnet_id = id
            name      = lookup(subnet.tags, "Name", "")
            vpc_id    = subnet.vpc_id
          }]
        }

    resource:
      template: |
        # Expect identifier: subnet_id
        data "aws_subnet" "result" {
          id = var.subnet_id
        }

        output "subnet_id" {
          value = data.aws_subnet.result.id
        }

        output "vpc_id" {
          value = data.aws_subnet.result.vpc_id
        }

        output "cidr_block" {
          value = data.aws_subnet.result.cidr_block
        }

        output "availability_zone" {
          value = data.aws_subnet.result.availability_zone
        }

        output "tags" {
          value = data.aws_subnet.result.tags
        }


      outputs:
      - name: subnet_id
        type: string
      - name: vpc_id
        type: string
      - name: cidr_block
        type: string
      - name: availability_zone
        type: string
