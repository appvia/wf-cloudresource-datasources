apiVersion: cloudresources.appvia.io/v2beta2
kind: CloudResourceDataSource
metadata:
  name: aws-subnet
spec:
  description: AWS Subnet resource kind
  version: "1.0.0"
  provider: terraform
  cloud: aws
  terraform:
    search:
      template: |
        # List all Subnets and then filter by tags if provided
        data "aws_subnets" "all" {}

        data "aws_subnet" "details" {
          for_each = toset(data.aws_subnets.all.ids)
          id       = each.value
        }

        locals {
          # Filter Subnets based on tags if provided, otherwise return all
          filtered_subnets = var.resource_tags == {} ? data.aws_subnet.details : {
            for id, subnet in data.aws_subnet.details :
            id => subnet
            if alltrue([
              for tag_key, tag_value in var.resource_tags :
              lookup(subnet.tags, tag_key, "") == tag_value
            ])
          }
        }

        # Output the filtered results with consistent structure
        output "output" {
          value = [for id, subnet in local.filtered_subnets : {
            subnet_id = id
            name      = lookup(subnet.tags, "Name", "")
            vpc_id    = subnet.vpc_id
          }]
        }

    resource:
      template: |
        # Expect identifier: subnet_id
        data "aws_subnet" "result" {
          id = var.subnet_id
        }

        output "subnet_id" {
          value = data.aws_subnet.result.id
        }

        output "vpc_id" {
          value = data.aws_subnet.result.vpc_id
        }

        output "cidr_block" {
          value = data.aws_subnet.result.cidr_block
        }

        output "availability_zone" {
          value = data.aws_subnet.result.availability_zone
        }

        output "tags" {
          value = data.aws_subnet.result.tags
        }


