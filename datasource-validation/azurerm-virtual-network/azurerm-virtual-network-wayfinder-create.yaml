apiVersion: v1
name: crk-azurerm-virtual-network
vars:
- name: rgName
  description: The name of the Resource Group
components:
  vnet:
    type: CloudResource
    plan:
      name: crk-azurerm-virtual-network
      version: 0.0.3
    inputs:
    - name: name
      value: "crk-az-vnet-{{ .Stack.Instance.Name }}"
    - name: resource_group_name
      value: "{{ .Vars.rgName }}"
    - name: location
      value: "uksouth"
